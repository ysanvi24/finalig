# ─── VNIT IG App — Nginx Reverse Proxy for AWS EC2 ───
# Serves frontend SPA + proxies API/WebSocket to Node.js backend
# Install: sudo cp deploy/nginx-aws.conf /etc/nginx/sites-available/vnit-ig
#          sudo ln -sf /etc/nginx/sites-available/vnit-ig /etc/nginx/sites-enabled/
#          sudo rm -f /etc/nginx/sites-enabled/default
#          sudo nginx -t && sudo systemctl reload nginx

server {
    listen       80;
    server_name  13.204.112.229 _;

    # ── Serve the Vite SPA build ──
    root   /var/www/vnit-ig/client/dist;
    index  index.html;

    # ── Gzip Compression ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Client-side max upload size (for council photos, etc.) ──
    client_max_body_size 10M;

    # ── Static Assets — immutable cache (hashed filenames from Vite) ──
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── API Proxy to Node.js Backend ──
    location /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # ── Socket.io WebSocket Proxy ──
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Uploaded Files (council photos, match images) ──
    location /uploads/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_cache_valid  200 24h;
    }

    # ── SPA Fallback — all other routes serve index.html ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security Headers ──
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Logging ──
    access_log /var/log/nginx/vnit-ig-access.log;
    error_log  /var/log/nginx/vnit-ig-error.log;
}
